<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Благодарим Ви за поръчката! | Хидролукс Груп</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0f3d70;
      --primary-dark: #0a294d;
      --secondary: #ff8f00;
      --bg-light: #f8fafc;
      --text-dark: #0f172a;
      --text-muted: #64748b;
      --success: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-light);
      color: var(--text-dark);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .thank-you-container {
      max-width: 600px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .thank-you-card {
      background: #ffffff;
      width: 100%;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(15, 61, 112, 0.05);
      border: 1px solid #cbd5e1;
      text-align: center;
    }

    /* Slow Animated Smooth Checkmark */
    .checkmark-wrapper {
      width: 100px;
      height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 25px;
    }

    .checkmark {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: block;
      stroke-width: 3;
      stroke: var(--success);
      stroke-miterlimit: 10;
      box-shadow: inset 0px 0px 0px var(--success);
      animation: fill .4s ease-in-out .6s forwards, scale .3s ease-in-out .9s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .checkmark-circle {
      stroke-dasharray: 166;
      stroke-dashoffset: 166;
      stroke-width: 3;
      stroke-miterlimit: 10;
      stroke: var(--success);
      fill: none;
      animation: stroke 1.2s cubic-bezier(0.65, 0, 0.45, 1) forwards;
    }

    .checkmark-check {
      transform-origin: 50% 50%;
      stroke-dasharray: 48;
      stroke-dashoffset: 48;
      stroke: var(--success);
      animation: stroke 1.5s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
    }

    @keyframes stroke {
      100% {
        stroke-dashoffset: 0;
      }
    }

    @keyframes scale {
      0%, 100% {
        transform: none;
      }
      50% {
        transform: scale3d(1.1, 1.1, 1);
      }
    }

    @keyframes fill {
      100% {
        box-shadow: inset 0px 0px 0px 40px #f0fdf4;
      }
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 10px;
    }

    .order-number {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--secondary);
      margin-bottom: 15px;
    }

    .desc {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 30px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }

    .divider {
      height: 1px;
      background-color: #cbd5e1;
      margin: 20px 0;
    }

    /* Invoice Box style */
    .invoice-box {
      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 24px;
      text-align: left;
      font-size: 0.88rem;
      width: 100%;
    }

    .invoice-title {
      font-weight: 800;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--primary);
      margin-bottom: 10px;
    }

    .invoice-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 15px;
    }

    @media (max-width: 480px) {
      .invoice-grid {
        grid-template-columns: 1fr;
        gap: 15px;
      }
    }

    .invoice-items {
      margin-top: 15px;
    }

    .invoice-item-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #f1f5f9;
    }

    .invoice-footer-totals {
      margin-top: 15px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
    }

    .grand-total {
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--primary);
      border-top: 1.5px solid #cbd5e1;
      margin-top: 8px;
      padding-top: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 28px;
      font-size: 0.95rem;
      font-weight: 700;
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      border: none;
    }

    .btn-primary {
      background-color: var(--primary);
      color: #ffffff;
      margin-top: 20px;
    }

    .btn-primary:hover {
      background-color: var(--primary-dark);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="thank-you-container">
    <div class="thank-you-card">
      <div class="checkmark-wrapper">
        <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
          <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
          <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
        </svg>
      </div>

      <h1>Благодарим Ви за поръчката!</h1>
      <div class="order-number" id="order-number-val">Поръчка #HL-123456</div>
      <p class="desc" id="order-desc-val">Наш консултант ще се свърже с Вас за потвърждение.</p>

      <div class="invoice-box" id="invoice-details-box" style="display: none;">
        <div class="invoice-title">📝 Детайли на поръчката / Проформа фактура</div>
        <div class="divider"></div>
        
        <div class="invoice-grid">
          <div>
            <strong>Доставчик:</strong><br>
            Хидролукс Груп ЕООД<br>
            гр. Монтана, ул. „Индустриална“ 32г<br>
            тел: 089 248 4337
          </div>
          <div id="receiver-details">
            <!-- Populated via JS -->
          </div>
        </div>

        <div class="divider"></div>

        <div class="invoice-items" id="invoice-items-list">
          <!-- Populated via JS -->
        </div>

        <div class="invoice-footer-totals" id="invoice-totals">
          <!-- Populated via JS -->
        </div>
      </div>

      <a href="/" class="btn btn-primary">Обратно към началото</a>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const orderDataStr = localStorage.getItem("hydrolux_last_order");
      if (!orderDataStr) return;

      try {
        const order = JSON.parse(orderDataStr);
        
        document.getElementById("order-number-val").textContent = `Поръчка #${order.orderNumber}`;
        document.getElementById("order-desc-val").innerHTML = `Наш консултант ще се свърже с Вас на тел. <strong>${order.customer.phone}</strong> за потвърждение на поръчката.`;

        const deliveryMap = {
          address: "До личен / служебен адрес",
          office: "До офис на Еконт",
          shop: "Вземане от магазина"
        };
        const paymentMap = {
          cod: "💵 Наложен платеж",
          bank: "🏦 Банков превод",
          card: "💳 С карта (myPOS)"
        };

        const deliveryText = deliveryMap[order.delivery] || order.delivery;
        const paymentText = paymentMap[order.paymentMethod] || order.paymentMethod;

        // Receiver column
        let receiverHtml = `
          <strong>Получател:</strong><br>
          ${order.customer.name}<br>
          тел: ${order.customer.phone}<br>
          имейл: ${order.customer.email}<br>
        `;
        if (order.delivery !== "shop") {
          receiverHtml += `град: ${order.city}, ПК: ${order.postcode}<br>`;
        }
        receiverHtml += `<strong>Доставка:</strong> ${deliveryText}<br>`;
        if (order.delivery !== "shop") {
          receiverHtml += `<strong>Адрес/Офис:</strong> ${order.address}<br>`;
        }
        receiverHtml += `<strong>Плащане:</strong> ${paymentText}`;
        document.getElementById("receiver-details").innerHTML = receiverHtml;

        // Items list
        const itemsList = document.getElementById("invoice-items-list");
        itemsList.innerHTML = order.items.map((item, idx) => {
          const itemTotal = parseFloat(item.priceEur) * parseInt(item.quantity);
          return `
            <div class="invoice-item-row">
              <span>
                ${idx + 1}. ${item.name} ${item.variantName ? `(${item.variantName})` : ''}
                ${item.specsText ? `<br><small style="color: var(--text-muted); font-size: 0.75rem; display: block; margin-top: 2px;">${item.specsText}</small>` : ''}
              </span>
              <span>${item.quantity} x ${item.priceEur.toFixed(2)} €</span>
              <strong>${itemTotal.toFixed(2)} €</strong>
            </div>
          `;
        }).join("");

        // Totals
        const eurTotal = parseFloat(order.totals.eur);
        const bgnTotal = eurTotal * 1.95583;
        const subtotalEur = eurTotal / 1.2;
        const ddsEur = eurTotal - subtotalEur;

        document.getElementById("invoice-totals").innerHTML = `
          <div class="total-row">
            <span>Междинна сума:</span>
            <span>${subtotalEur.toFixed(2)} €</span>
          </div>
          <div class="total-row">
            <span>ДДС (20%):</span>
            <span>${ddsEur.toFixed(2)} €</span>
          </div>
          <div class="total-row grand-total">
            <span>ОБЩО С ДДС:</span>
            <span>${eurTotal.toFixed(2)} € (${bgnTotal.toFixed(2)} лв.)</span>
          </div>
        `;

        document.getElementById("invoice-details-box").style.display = "block";

      } catch (e) {
        console.error("Error parsing order data", e);
      }
    });
  </script>
</body>
</html>
